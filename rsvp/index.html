<!doctype html>

<html lang="it">

<head>

  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Conferma partecipazione</title>

  <link rel="stylesheet" href="rsvp.css" />

</head>

<body>

  <main class="page">

    <section class="card">

      <a class="back-link" href="../">

        ← Torna all’evento

      </a>

      <p class="eyebrow">

        RSVP

      </p>

      <h1>

        Conferma

      </h1>

      <p class="intro">

        Compila il form per aggiungere dettagli alla tua conferma.

      </p>

      <form id="rsvpForm" class="form">

        <label>

          Nome *

          <input

            name="first_name"

            type="text"

            required

          />

        </label>

        <label>

          Cognome o soprannome *

          <input

            name="last_name_or_nickname"

            type="text"

            required

          />

        </label>

        <fieldset>

          <legend>

            Parteciperai?

          </legend>

          <label class="radio-row">

            <input

              type="radio"

              name="attendance_status"

              value="yes"

              required

            />

            Sì

          </label>

          <label class="radio-row">

            <input

              type="radio"

              name="attendance_status"

              value="no"

              required

            />

            No

          </label>

        </fieldset>

        <label>

          In quanti saranno oltre a te?

          <input

            name="guests_count"

            type="number"

            min="0"

            value="0"

          />

        </label>

        <fieldset>

          <legend>

            Se vieni accompagnato, avresti bisogno di un NCC o di un taxi per il ritorno? **vedi note sotto**

          </legend>

          <label class="radio-row">

            <input

              type="radio"

              name="needs_ncc_return"

              value="yes"

              required

            />

            Sì

          </label>

          <label class="radio-row">

            <input

              type="radio"

              name="needs_ncc_return"

              value="no"

              required

            />

            No

          </label>

        </fieldset>

        <button id="submitButton" type="submit">

          Invia risposta

        </button>

        <p id="formMessage" class="form-message"></p>

      </form>

    </section>

  </main>

  <script type="module" src="rsvp.js"></script>

</body>

</html>
